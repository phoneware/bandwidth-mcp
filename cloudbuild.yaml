# Cloud Build pipeline for the Phoneware-hosted Bandwidth MCP.
#
# Triggered by pushes to `main` (Cloud Build GitHub trigger in phoneware-edge).
# Builds the image, pushes to Artifact Registry, deploys to Cloud Run.
#
# Prereqs (one-time, see DEPLOY.md):
#   - Artifact Registry repo `bandwidth-mcp` in us-central1.
#   - Secret Manager: bandwidth-client-id, bandwidth-client-secret, bandwidth-gateway-token.
#   - The Cloud Run runtime SA can access those secrets (roles/secretmanager.secretAccessor).
#
# Security model: the service is public ingress (Bandwidth callbacks + the Claude
# client must reach it) but /mcp is gated by BW_GATEWAY_TOKEN (see serve.py).
steps:
  - id: test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        pip install --no-cache-dir "fastmcp~=3.2" "mcp~=1.24" "httpx~=0.28.0" \
          "pyyaml~=6.0.0" "werkzeug>=3.1.4" uvicorn pytest pytest-asyncio pytest-httpx
        python -m pytest -q

  - id: build
    name: gcr.io/cloud-builders/docker
    waitFor: ['test']
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bandwidth-mcp:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bandwidth-mcp:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: ['build']
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bandwidth-mcp']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bandwidth-mcp
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bandwidth-mcp:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      # Public ingress is required (Bandwidth callbacks + the Claude client reach
      # it directly); /mcp is protected by BW_GATEWAY_TOKEN inside the app.
      - --allow-unauthenticated
      # In-memory event store + webhook callbacks -> keep one warm instance.
      - --min-instances=1
      - --max-instances=1
      - --memory=512Mi
      - --cpu=1
      # BW_GATEWAY_TOKEN is the HMAC signing key for OAuth codes/bearers.
      # Bandwidth API creds are deliberately NOT mounted: they live in the
      # client's connector config and only transit /token (see serve.py).
      - --set-secrets=BW_GATEWAY_TOKEN=bandwidth-gateway-token:latest
      # BW_MCP_BASE_URL should be the service's public URL once known (needed for
      # voice/messaging callbacks). BW_MCP_PROFILE trims the tool surface.
      # --set-env-vars REPLACES the service env wholesale: this list is the
      # complete pipeline-managed env. BW_MCP_BASE_URL is the OAuth issuer and
      # callback base — it must ride here or a deploy wipes it.
      # Tool surface is deployment-managed here: profiles pick the groups,
      # BW_MCP_EXCLUDE_TOOLS prunes individual tools Phoneware doesn't use
      # (enforced uniformly for OpenAPI-derived AND hand-written tools).
      # ^@^ switches gcloud's env-var delimiter to @ so the comma lists pass
      # through intact.
      # Messaging is deliberately absent: Phoneware texts via Clerk/NS, not
      # Bandwidth directly (no createMessage/listMessages/media/inbound).
      # BW_ACCOUNT_ID pins the default account: the OAuth token lists the
      # accounts in an order where [0] is NOT the main Phoneware account
      # (5011296 first, 5011369 = the account the numbers live on). Tools
      # still reach the other account via their account_id parameter.
      # voice profile dropped: these creds return 403 on every Voice API
      # call (Phoneware's voice platform is NetSapiens, not Bandwidth), so
      # the voice tools were dead weight that could only mislead the agent.
      # lookup profile also dropped: the TN Lookup product is not enabled on
      # this Bandwidth account ("Account not authorized"); re-add the profile
      # here if Bandwidth enables it.
      - --set-env-vars=^@^BW_MCP_TRANSPORT=streamable-http@BW_MCP_HOST=0.0.0.0@BW_MCP_PORT=8080@BW_ACCOUNT_ID=5011369@BW_MCP_PROFILE=numbers,numbers-write,billing@BW_MCP_EXCLUDE_TOOLS=clearCredentials,createRegistration,uploadMedia,deleteMedia,createApplication@BW_MCP_BASE_URL=https://mcp.bandwidth.phoneware.cloud

substitutions:
  _REGION: us-central1
  _REPO: bandwidth-mcp

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bandwidth-mcp:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/bandwidth-mcp:latest'

options:
  logging: CLOUD_LOGGING_ONLY
